<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorization Successful | Cut Nerd</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .code-box { word-break: break-all; font-family: monospace; background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(244, 63, 94, 0.2); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="glass max-w-lg w-full rounded-3xl p-8 text-center shadow-2xl border-t-4 border-green-500">
        <div class="mb-6 flex justify-center">
            <div class="bg-green-500/20 p-4 rounded-full">
                <svg class="w-12 h-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
        </div>

        <h1 class="text-3xl font-bold mb-3">Authorization Complete</h1>
        <p class="text-slate-400 mb-8">The secure access token has been generated. Use the code below for your manual integration.</p>

        <div class="code-box rounded-xl p-6 mb-6 text-rose-500 text-sm font-semibold tracking-wider">
            <span class="block uppercase text-[10px] text-slate-500 mb-2 tracking-[0.2em]">Manual Authorization Code</span>
            <div id="authCode" class="select-all cursor-text">Retrieving...</div>
        </div>
        
        <a href="index.html" class="inline-block w-full bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 px-6 rounded-xl transition-all active:scale-95 mb-4">
            Return to Dashboard
        </a>

        <p class="mt-6 text-[10px] text-slate-500 uppercase tracking-widest border-t border-white/5 pt-6">Cut Nerd Solutions • Automated Integration System</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        
        if (code) {
            document.getElementById('authCode').innerText = code;
        } else {
            document.getElementById('authCode').innerText = "No code found";
            document.getElementById('authCode').classList.add('text-slate-500');
        }
    </script>
</body>
</html>
