<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notícia Completa | Cut Nerd</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/lhVehwi.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .skeleton {
            background: linear-gradient(90deg, #15191e 25%, #1c2229 50%, #15191e 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="bg-[#0b0e11] text-gray-100 min-h-screen flex flex-col">

    <nav class="border-b border-gray-800 bg-[#0f1216]/95 backdrop-blur py-4 px-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-3 hover:opacity-80 transition">
                <img src="https://i.imgur.com/lhVehwi.png" alt="Cut Nerd Logo" class="w-10 h-10 rounded-lg object-contain">
                <div>
                    <span class="text-xl font-bold tracking-tight block">Cut Nerd <span class="text-[#fe2c55]"></span></span>
                    <span class="text-[10px] text-gray-500">Portal de Notícias</span>
                </div>
            </a>
            <div class="hidden md:flex space-x-6 text-sm font-medium text-gray-400">
                <a href="index.html" class="hover:text-white transition">Notícias</a>
                <a href="dashboard.html" class="hover:text-white transition">Dashboard</a>
                <a href="about.html" class="hover:text-white transition">Sobre</a>
                <a href="contact.html" class="hover:text-white transition">Contato</a>
                <a href="terms.html" class="hover:text-white transition">Terms</a>
                <a href="privacy.html" class="hover:text-white transition">Privacy</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-4xl mx-auto px-6 py-12 w-full">
        <article id="news-content" class="mb-12">
            <!-- Skeleton Loading -->
            <div class="skeleton h-96 rounded-xl mb-8"></div>
            <div class="skeleton h-8 rounded mb-4"></div>
            <div class="skeleton h-6 rounded mb-8 w-1/3"></div>
            <div class="skeleton h-4 rounded mb-2"></div>
            <div class="skeleton h-4 rounded mb-2"></div>
            <div class="skeleton h-4 rounded w-2/3"></div>
        </article>

        <!-- Action Buttons -->
        <div id="action-buttons" class="flex flex-col sm:flex-row gap-4 mb-12">
            <a id="source-link" href="#" target="_blank" rel="noopener" class="flex-1 inline-flex items-center justify-center bg-gradient-to-r from-[#fe2c55] to-[#25f4ee] text-white font-bold py-3 rounded-lg hover:opacity-90 transition">
                <i class="fa-solid fa-external-link mr-2"></i>
                Ler Notícia Completa
            </a>
            <button onclick="shareNews()" class="flex-1 inline-flex items-center justify-center bg-[#1c2229] border border-gray-700 hover:border-[#fe2c55]/50 text-white font-bold py-3 rounded-lg transition">
                <i class="fa-solid fa-share-nodes mr-2"></i>
                Compartilhar
            </button>
            <button onclick="saveNews()" class="flex-1 inline-flex items-center justify-center bg-[#1c2229] border border-gray-700 hover:border-cyan-400/50 text-white font-bold py-3 rounded-lg transition">
                <i class="fa-solid fa-bookmark mr-2"></i>
                Salvar
            </button>
        </div>

        <!-- Share Options (Hidden by default) -->
        <div id="share-options" class="hidden mb-12 bg-[#15191e] border border-gray-800 rounded-xl p-6">
            <h3 class="font-bold mb-4">Compartilhar em:</h3>
            <div class="flex flex-wrap gap-3">
                <button onclick="shareOn('whatsapp')" class="inline-flex items-center bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition">
                    <i class="fa-brands fa-whatsapp mr-2"></i> WhatsApp
                </button>
                <button onclick="shareOn('twitter')" class="inline-flex items-center bg-blue-400 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded transition">
                    <i class="fa-brands fa-twitter mr-2"></i> Twitter
                </button>
                <button onclick="shareOn('facebook')" class="inline-flex items-center bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition">
                    <i class="fa-brands fa-facebook mr-2"></i> Facebook
                </button>
                <button onclick="shareOn('linkedin')" class="inline-flex items-center bg-blue-700 hover:bg-blue-800 text-white font-bold py-2 px-4 rounded transition">
                    <i class="fa-brands fa-linkedin mr-2"></i> LinkedIn
                </button>
                <button onclick="copyToClipboard()" class="inline-flex items-center bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded transition">
                    <i class="fa-solid fa-copy mr-2"></i> Copiar Link
                </button>
            </div>
        </div>

        <!-- Related News -->
        <div>
            <h3 class="text-2xl font-bold mb-6 flex items-center gap-2">
                <i class="fa-solid fa-newspaper text-[#fe2c55]"></i>
                Notícias Relacionadas
            </h3>
            <div id="related-news" class="grid md:grid-cols-2 gap-4">
                <!-- Será preenchido via JS -->
            </div>
        </div>
    </main>

    <footer class="border-t border-gray-800 py-12 px-6 bg-[#0f1216] mt-12">
        <div class="max-w-7xl mx-auto text-center">
            <p class="text-gray-500 text-sm">© 2026 Cut Nerd | <a href="mailto:viniciusnerdcut@gmail.com" class="text-[#fe2c55] hover:text-cyan-400 transition">Contato</a></p>
        </div>
    </footer>

    <script src="news-api.js"></script>
    <script>
        let selectedNews = null;
        let allNews = [];

        window.addEventListener('load', async () => {
            loadNewsDetail();
        });

        async function loadNewsDetail() {
            try {
                const stored = localStorage.getItem('selectedNews');
                if (stored) {
                    selectedNews = JSON.parse(stored);
                }

                if (!selectedNews) {
                    window.location.href = 'index.html';
                    return;
                }

                const category = selectedNews.category || 'technology';
                const news = await fetchNews(category);
                allNews = news;

                renderNewsDetail();
                renderRelatedNews();
            } catch (error) {
                console.error('Erro:', error);
                showError();
            }
        }

        function renderNewsDetail() {
            const date = new Date(selectedNews.publishedAt).toLocaleDateString('pt-BR', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            document.getElementById('news-content').innerHTML = `
                ${selectedNews.urlToImage ? `
                    <div class="relative h-96 rounded-xl overflow-hidden mb-8 group">
                        <img src="${selectedNews.urlToImage}" alt="${selectedNews.title}" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                    </div>
                ` : ''}

                <div class="flex items-center gap-3 mb-6">
                    <span class="px-4 py-1 rounded-full bg-gradient-to-r from-[#fe2c55]/20 to-[#25f4ee]/20 text-sm font-semibold text-cyan-400">
                        ${selectedNews.source?.name || 'Notícia'}
                    </span>
                </div>

                <h1 class="text-4xl md:text-5xl font-extrabold mb-4 leading-tight">
                    ${selectedNews.title}
                </h1>

                <div class="flex flex-wrap items-center gap-4 text-gray-400 text-sm mb-8 pb-8 border-b border-gray-700">
                    <span><i class="fa-solid fa-calendar mr-2"></i>${date}</span>
                    <span><i class="fa-solid fa-user mr-2"></i>${selectedNews.author || 'Autor desconhecido'}</span>
                </div>

                <div class="prose prose-invert max-w-none text-gray-300 leading-relaxed text-lg mb-8">
                    <p>${selectedNews.description}</p>
                    ${selectedNews.content ? `<p>${selectedNews.content}</p>` : ''}
                </div>

                <div class="bg-gradient-to-r from-[#fe2c55]/10 to-[#25f4ee]/10 border border-[#fe2c55]/20 rounded-lg p-6 mb-8">
                    <p class="text-gray-300 text-sm italic">
                        <i class="fa-solid fa-circle-info text-cyan-400 mr-2"></i>
                        Esta notícia é fornecida por ${selectedNews.source?.name || 'fonte de notícias'}. Para a versão completa e atualizada, clique em "Ler Notícia Completa".
                    </p>
                </div>
            `;

            document.getElementById('source-link').href = selectedNews.url;
        }

        function renderRelatedNews() {
            const related = allNews
                .filter(news => news.title !== selectedNews.title)
                .slice(0, 2);

            if (related.length === 0) {
                document.getElementById('related-news').innerHTML = `
                    <div class="col-span-full text-center py-8 text-gray-400">
                        <p>Nenhuma notícia relacionada no momento.</p>
                    </div>
                `;
                return;
            }

            document.getElementById('related-news').innerHTML = related.map(news => `
                <div class="bg-[#15191e] border border-gray-800 rounded-lg p-4 hover:border-[#fe2c55]/50 transition cursor-pointer" onclick="selectRelatedNews('${news.title.replace(/'/g, "\\'")}')">
                    ${news.urlToImage ? `<img src="${news.urlToImage}" alt="${news.title}" class="w-full h-32 object-cover rounded mb-3">` : ''}
                    <h4 class="font-bold mb-2 line-clamp-2 text-sm hover:text-[#fe2c55] transition">
                        ${news.title}
                    </h4>
                    <p class="text-xs text-gray-400 line-clamp-1 mb-3">
                        ${news.source?.name || 'Fonte'}
                    </p>
                    <div class="text-xs text-gray-500">
                        ${new Date(news.publishedAt).toLocaleDateString('pt-BR')}
                    </div>
                </div>
            `).join('');
        }

        function selectRelatedNews(title) {
            const news = allNews.find(n => n.title === title);
            if (news) {
                selectedNews = news;
                localStorage.setItem('selectedNews', JSON.stringify(news));
                renderNewsDetail();
                renderRelatedNews();
                window.scrollTo(0, 0);
            }
        }

        function shareNews() {
            const shareOptions = document.getElementById('share-options');
            shareOptions.classList.toggle('hidden');
        }

        function shareOn(platform) {
            const url = window.location.href;
            const title = selectedNews.title;
            const text = `${title} - Leia em Cut Nerd News`;

            let shareUrl = '';

            switch(platform) {
                case 'whatsapp':
                    shareUrl = `https://wa.me/?text=${encodeURIComponent(text + ' ' + selectedNews.url)}`;
                    break;
                case 'twitter':
                    shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(selectedNews.url)}`;
                    break;
                case 'facebook':
                    shareUrl = `https://facebook.com/sharer/sharer.php?u=${encodeURIComponent(selectedNews.url)}`;
                    break;
                case 'linkedin':
                    shareUrl = `https://linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(selectedNews.url)}`;
                    break;
            }

            if (shareUrl) {
                window.open(shareUrl, '_blank');
            }
        }

        function copyToClipboard() {
            const url = selectedNews.url;
            navigator.clipboard.writeText(url).then(() => {
                alert('Link copiado para a área de transferência!');
            }).catch(() => {
                alert('Erro ao copiar link');
            });
        }

        function saveNews() {
            let saved = JSON.parse(localStorage.getItem('savedNews') || '[]');
            if (!saved.find(n => n.url === selectedNews.url)) {
                saved.push(selectedNews);
                localStorage.setItem('savedNews', JSON.stringify(saved));
                alert('Notícia salva!');
            } else {
                alert('Esta notícia já está salva');
            }
        }

        function showError() {
            document.getElementById('news-content').innerHTML = `
                <div class="text-center py-12">
                    <i class="fa-solid fa-triangle-exclamation text-6xl text-[#fe2c55] mb-4 opacity-30"></i>
                    <h2 class="text-2xl font-bold mb-2">Erro ao carregar</h2>
                    <p class="text-gray-400 mb-6">Não foi possível carregar a notícia.</p>
                    <a href="index.html" class="inline-block px-6 py-2 rounded-lg bg-gradient-to-r from-[#fe2c55] to-[#25f4ee] text-white font-bold hover:opacity-90 transition">
                        Voltar para Home
                    </a>
                </div>
            `;
        }
    </script>
</body>
</html>
